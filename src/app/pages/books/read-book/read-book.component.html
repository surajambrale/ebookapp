<div *ngIf="allowed; else noAccess">

  <!-- 🔥 SECURE PDF VIEW -->

    [src]="pdfUrl"
    width="100%" 
    height="600px">
  </iframe>

  <button (click)="logout()">Logout</button>

</div>

</ng-template>
