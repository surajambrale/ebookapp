

<div class="login">

  <h2 *ngIf="isRegisterMode">Register</h2>
  <h2 *ngIf="!isRegisterMode">Login</h2>

  <input type="text" [(ngModel)]="name" placeholder="Name" *ngIf="isRegisterMode">

  <input type="text" [(ngModel)]="phone" placeholder="Phone Number">

  <button (click)="submit()">
    {{ isRegisterMode ? 'Register' : 'Login' }}
  </button>

  <p (click)="toggleMode()" style="cursor:pointer; color:blue">
    {{ isRegisterMode ? 'Already have account? Login' : 'New user? Register' }}
  </p>

</div>
