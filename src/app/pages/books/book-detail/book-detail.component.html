<div class="book-detail" *ngIf="book">

  <div class="top-section">

    <div class="image">
      <img [src]="book.image" />
    </div>

    <div class="details">
      <h1>{{ book.title }}</h1>
      <p class="author">{{ book.author }}</p>

      <div class="rating">
        ⭐⭐⭐⭐☆ ({{ book.reviews }})
      </div>

      <h2 class="price">₹{{ book.price }}</h2>

      <!-- 🔥 BUTTONS -->
      <div class="actions">

        <button class="buy" *ngIf="hasAccess" (click)="readBook()">
          Read Book
        </button>

        <button class="buy" *ngIf="!hasAccess" (click)="buyBook()">
          Buy Now
        </button>

      </div>

      <!-- 🔥 MOVE DESCRIPTION HERE -->
      <div class="description">
        <h3>Book Overview</h3>
        <p>{{ book.description }}</p>
      </div>

    </div>

  </div>

</div>
